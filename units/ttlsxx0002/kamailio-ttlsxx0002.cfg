#!KAMAILIO
#
# Minimal TLS-only config for dual-cert unit test (ttlsxx0002)
#

debug=1
log_stderror=yes
fork=yes
children=2
auto_aliases=no

listen=tls:0.0.0.0:5061

enable_tls=yes
tls_max_connections=64
tcp_connection_lifetime=600
tcp_max_connections=64

loadmodule "sl.so"
loadmodule "tm.so"
loadmodule "pv.so"
loadmodule "textops.so"
loadmodule "xlog.so"
loadmodule "tls.so"

modparam("tls", "config", "__TLS_CFG__")

request_route {
	if($rm == "OPTIONS") {
		sl_send_reply("200", "OK");
		exit;
	}
	sl_send_reply("404", "Not Found");
}
