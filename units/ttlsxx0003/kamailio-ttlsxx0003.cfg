#!KAMAILIO

# ----------- global configuration parameters ------------------------
debug=2
fork=yes
log_stderror=no
children=1
listen=udp:127.0.0.1:5060
listen=tls:127.0.0.1:5061
auto_aliases=no
alias=example.invalid
disable_tcp=no
enable_tls=yes
tls_connection_match_domain=yes

# ------------------ module loading ----------------------------------
loadmodule "pv.so"
loadmodule "tm.so"
loadmodule "sl.so"
loadmodule "ctl.so"

loadmodule "tls.so"
modparam("tls", "config", "kamailio-ttlsxx0003-tls.cfg")
modparam("tls", "xavp_cfg", "tls")

request_route {
	# the idea is to receive request with X-TLS-Server-ID:1 from sipsak
	# and then forward it to itself via TLS with TLS client domain forced by server_id xavp (see 62_tls.cfg)
	# working tls_connection_match_domain=yes should open new TLS connection for request with X-TLS-Server-ID:2
	# and do not reuse existent one
	if($proto=="udp") {
		$xavp(tls=>server_id) = $hdr(X-TLS-Server-ID);
		t_relay_to_tls("127.0.0.1", 5061);
	} else {
		sl_send_reply(200, "Ok");
	}
	exit;
}
